name: Build & Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Which part of the version to increment'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: 'Override version (e.g., 2.0.0). Skips auto-increment if provided.'
        required: false
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            CURRENT=$(cat VERSION | tr -d '[:space:]')
            IFS='.' read -r major minor patch <<< "$CURRENT"
            case "${{ inputs.bump_type }}" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              *)     patch=$((patch + 1)) ;;
            esac
            VERSION="$major.$minor.$patch"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: determine-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set app version in tauri.conf.json
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' \
            apps/desktop/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json apps/desktop/src-tauri/tauri.conf.json

      - name: Build macOS Desktop
        run: pnpm build:desktop:mac
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Discover and stage macOS bundle outputs
        run: |
          set -e
          mkdir -p dist-macos
          echo "=== All bundle outputs under target/ ==="
          find apps/desktop/src-tauri/target -type f \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) -print

          DMG_COUNT=$(find apps/desktop/src-tauri/target -type f -name "*.dmg" | wc -l | tr -d ' ')
          UPDATE_COUNT=$(find apps/desktop/src-tauri/target -type f -name "*.app.tar.gz" | wc -l | tr -d ' ')
          SIG_COUNT=$(find apps/desktop/src-tauri/target -type f -name "*.app.tar.gz.sig" | wc -l | tr -d ' ')

          echo "Counts: dmg=$DMG_COUNT, update=$UPDATE_COUNT, sig=$SIG_COUNT"

          if [ "$DMG_COUNT" -eq 0 ]; then
            echo "::error::No .dmg files were produced by the macOS build."
            exit 1
          fi
          if [ "$UPDATE_COUNT" -eq 0 ]; then
            echo "::error::No .app.tar.gz update bundle was produced by the macOS build."
            exit 1
          fi
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "::warning::No .app.tar.gz.sig found — TAURI_SIGNING_PRIVATE_KEY likely unset. Release will be created without auto-update support for macOS."
          fi

          find apps/desktop/src-tauri/target -type f \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) \
            -exec cp {} dist-macos/ \;

          echo "=== Staged in dist-macos/ ==="
          ls -la dist-macos/

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: adhd-life-macos-dmg
          path: dist-macos/*.dmg
          if-no-files-found: error
          retention-days: 1

      - name: Upload macOS update bundle
        uses: actions/upload-artifact@v4
        with:
          name: adhd-life-macos-update
          path: dist-macos/*.app.tar.gz*
          if-no-files-found: error
          retention-days: 1

  build-windows:
    needs: determine-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set app version in tauri.conf.json
        shell: pwsh
        run: |
          $v = "${{ needs.determine-version.outputs.version }}"
          $cfg = Get-Content apps/desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $cfg.version = $v
          $cfg | ConvertTo-Json -Depth 32 | Set-Content apps/desktop/src-tauri/tauri.conf.json -Encoding utf8

      - name: Clear previous bundle outputs
        shell: pwsh
        run: |
          $bundles = Get-ChildItem -Path apps/desktop/src-tauri/target -Recurse -Directory -Filter bundle -ErrorAction SilentlyContinue
          if ($bundles) {
            $bundles | ForEach-Object {
              Write-Host "Removing $($_.FullName)"
              Remove-Item $_.FullName -Recurse -Force
            }
          } else {
            Write-Host "No bundle dirs found, skipping."
          }

      - name: Build Windows Desktop
        run: pnpm build:desktop:windows
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Discover and stage Windows bundle outputs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path dist-windows -Force | Out-Null

          Write-Host "=== Bundle outputs under target/*/bundle/ ==="
          $found = Get-ChildItem -Path apps/desktop/src-tauri/target -Recurse -Include *.exe,*.exe.sig -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\bundle\\' }
          $found | Format-Table FullName -AutoSize | Out-String | Write-Host

          $exes = $found | Where-Object { $_.Name -like '*.exe' }
          $sigs = $found | Where-Object { $_.Name -like '*.exe.sig' }

          Write-Host "Counts: exe=$($exes.Count), sig=$($sigs.Count)"

          if ($exes.Count -eq 0) {
            Write-Host "::error::No .exe installer was produced by the Windows build."
            exit 1
          }
          if ($sigs.Count -eq 0) {
            Write-Host "::warning::No .exe.sig found — TAURI_SIGNING_PRIVATE_KEY likely unset. Release will be created without auto-update support for Windows."
          }

          foreach ($f in $found) {
            Copy-Item $f.FullName -Destination dist-windows/
          }

          Write-Host "=== Staged in dist-windows/ ==="
          Get-ChildItem dist-windows | Format-Table Name,Length -AutoSize | Out-String | Write-Host

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: adhd-life-windows-exe
          path: dist-windows/*.exe
          if-no-files-found: error
          retention-days: 1

      - name: Upload Windows signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: adhd-life-windows-sig
          path: dist-windows/*.exe.sig
          if-no-files-found: warn
          retention-days: 1

  create-release:
    needs: [determine-version, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts (debug)
        run: |
          echo "=== artifacts/ tree ==="
          find artifacts -type f -print | sort

      - name: Generate latest.json
        id: latest
        run: |
          set -e
          VERSION="${{ needs.determine-version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/$REPO/releases/download/v$VERSION"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          MAC_SIG_FILE=$(find artifacts/adhd-life-macos-update -name "*.app.tar.gz.sig" -type f 2>/dev/null | head -n1 || true)
          MAC_BUNDLE_FILE=$(find artifacts/adhd-life-macos-update -name "*.app.tar.gz" -type f 2>/dev/null | head -n1 || true)
          WIN_SIG_FILE=$(find artifacts/adhd-life-windows-sig -name "*.exe.sig" -type f 2>/dev/null | head -n1 || true)
          WIN_EXE_FILE=$(find artifacts/adhd-life-windows-exe -name "*.exe" -type f 2>/dev/null | head -n1 || true)

          HAS_MAC=0
          HAS_WIN=0
          [ -n "$MAC_SIG_FILE" ] && [ -n "$MAC_BUNDLE_FILE" ] && HAS_MAC=1
          [ -n "$WIN_SIG_FILE" ] && [ -n "$WIN_EXE_FILE" ] && HAS_WIN=1

          if [ "$HAS_MAC" -eq 0 ] && [ "$HAS_WIN" -eq 0 ]; then
            echo "::warning::Auto-update signing not configured (no .sig files found on either platform). Releasing without latest.json."
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PLATFORMS_JSON='{}'

          if [ "$HAS_MAC" -eq 1 ]; then
            MAC_SIG=$(cat "$MAC_SIG_FILE")
            MAC_NAME=$(basename "$MAC_BUNDLE_FILE")
            MAC_URL="$BASE/$MAC_NAME"
            # Universal binary: list both archs pointing at the same bundle so Intel Macs auto-update too.
            PLATFORMS_JSON=$(echo "$PLATFORMS_JSON" | jq \
              --arg sig "$MAC_SIG" --arg url "$MAC_URL" \
              '. + {"darwin-aarch64": {signature: $sig, url: $url}, "darwin-x86_64": {signature: $sig, url: $url}}')
          else
            echo "::warning::macOS .sig missing — skipping darwin platform entries in latest.json."
          fi

          if [ "$HAS_WIN" -eq 1 ]; then
            WIN_SIG=$(cat "$WIN_SIG_FILE")
            WIN_NAME=$(basename "$WIN_EXE_FILE")
            WIN_URL="$BASE/$WIN_NAME"
            PLATFORMS_JSON=$(echo "$PLATFORMS_JSON" | jq \
              --arg sig "$WIN_SIG" --arg url "$WIN_URL" \
              '. + {"windows-x86_64": {signature: $sig, url: $url}}')
          else
            echo "::warning::Windows .exe.sig missing — skipping windows platform entry in latest.json."
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS_JSON" \
            '{version: $version, notes: "See the release page for details.", pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          echo "=== latest.json ==="
          cat latest.json
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Assemble release file list
        id: files
        run: |
          set -e
          {
            ls artifacts/adhd-life-macos-dmg/*.dmg 2>/dev/null || true
            ls artifacts/adhd-life-macos-update/*.app.tar.gz 2>/dev/null || true
            ls artifacts/adhd-life-windows-exe/*.exe 2>/dev/null || true
            if [ "${{ steps.latest.outputs.generated }}" = "true" ]; then
              echo "latest.json"
            fi
          } > release-files.txt

          echo "=== Files to attach to release ==="
          cat release-files.txt

          {
            echo "list<<EOF"
            cat release-files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.determine-version.outputs.version }}
          name: ADHD Life v${{ needs.determine-version.outputs.version }}
          body: |
            ## Downloads

            - **macOS (universal, Intel + Apple Silicon):** `*.dmg`
            - **Windows:** `*-setup.exe`

            [View build logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: ${{ steps.files.outputs.list }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version files and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          V="${{ needs.determine-version.outputs.version }}"

          echo "$V" > VERSION

          jq --arg v "$V" '.version = $v' \
            apps/desktop/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json apps/desktop/src-tauri/tauri.conf.json

          jq --arg v "$V" '.version = $v' \
            apps/desktop/package.json > tmp.json
          mv tmp.json apps/desktop/package.json

          sed -i -E "0,/^version = \"[^\"]+\"$/s//version = \"$V\"/" \
            apps/desktop/src-tauri/Cargo.toml

          git add VERSION \
                  apps/desktop/src-tauri/tauri.conf.json \
                  apps/desktop/src-tauri/Cargo.toml \
                  apps/desktop/package.json
          if git diff --staged --quiet; then
            echo "No version-file changes to commit (already in sync)."
          else
            git commit -m "chore: bump version to v$V [skip ci]"
            git push
          fi

      - name: Success
        run: |
          echo "Release v${{ needs.determine-version.outputs.version }} created."
          echo "URL: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.determine-version.outputs.version }}"
