name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0). If not provided, reads from VERSION file'
        required: false
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

env:
  NODE_VERSION: '20'
  RUST_VERSION: stable

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            VERSION=$(cat VERSION)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: determine-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install

      - name: Build macOS Desktop
        run: pnpm build:desktop:mac
        working-directory: apps/desktop
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: adhd-life-macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 1

      - name: Upload macOS update bundles
        uses: actions/upload-artifact@v4
        with:
          name: adhd-life-macos-update
          path: apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz*
          retention-days: 1

  build-windows:
    needs: determine-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install

      - name: Build Windows Desktop
        run: pnpm build:desktop:windows
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: adhd-life-windows-exe
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

      - name: Upload Windows signature
        uses: actions/upload-artifact@v4
        with:
          name: adhd-life-windows-sig
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
          retention-days: 1

  create-release:
    needs: [determine-version, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: inputs.create_release == true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/$REPO/releases/download/v$VERSION"

          MAC_ARM_SIG=$(cat artifacts/adhd-life-macos-update/*aarch64.app.tar.gz.sig)
          MAC_X64_SIG=$(cat artifacts/adhd-life-macos-update/*x64.app.tar.gz.sig)
          WIN_SIG=$(cat artifacts/adhd-life-windows-sig/*.exe.sig)

          MAC_ARM_FILE=$(basename $(ls artifacts/adhd-life-macos-update/*aarch64.app.tar.gz))
          MAC_X64_FILE=$(basename $(ls artifacts/adhd-life-macos-update/*x64.app.tar.gz))
          WIN_FILE=$(basename $(ls artifacts/adhd-life-windows-exe/*.exe))

          cat > latest.json << ENDJSON
          {
            "version": "$VERSION",
            "notes": "See the release page for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": { "signature": "$MAC_ARM_SIG", "url": "$BASE/$MAC_ARM_FILE" },
              "darwin-x86_64":  { "signature": "$MAC_X64_SIG", "url": "$BASE/$MAC_X64_FILE" },
              "windows-x86_64": { "signature": "$WIN_SIG",     "url": "$BASE/$WIN_FILE" }
            }
          }
          ENDJSON

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.determine-version.outputs.version }}
          name: ADHD Life v${{ needs.determine-version.outputs.version }}
          body: |
            ## Downloads

            - **macOS (Apple Silicon):** `*aarch64.dmg`
            - **macOS (Intel):** `*x64.dmg`
            - **Windows:** `*x64-setup.exe`

            [View on GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            artifacts/adhd-life-macos-dmg/*
            artifacts/adhd-life-macos-update/*.app.tar.gz
            artifacts/adhd-life-windows-exe/*
            latest.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success
        run: |
          echo "✅ Release v${{ needs.determine-version.outputs.version }} created!"
          echo "📦 Download from: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.determine-version.outputs.version }}"
