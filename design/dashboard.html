<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADHD Life — Design File</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Geist:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; user-select: none; -webkit-user-select: none; }
    body { font-family: 'Geist', system-ui, sans-serif; }
    #root { display: flex; flex-direction: column; }
    input, textarea, [contenteditable] { user-select: text; -webkit-user-select: text; }

    /* ── Tokens (light) ── */
    :root {
      --bg-page:       #fdf6ed;
      --bg-card:       #fffef9;
      --bg-card-lite:  #faf5ea;
      --bg-sidebar:    #fffef9;
      --bg-hover:      #fdf0df;
      --bg-accent:     #fdeef2;
      --bg-topbar:     #fffef9;
      --bg-bottom-nav: #fffef9;

      --border:        #e2d4c0;
      --border-logo:   #ecdfc8;
      --shadow:        #dfd0b8;
      --shadow-lite:   #dfd0b8;
      --shadow-accent: #f5c0cc;

      --text-primary:       #2d1f14;
      --text-body:          #3d2b1a;
      --text-muted:         #a08060;
      --text-faint:         #c4a882;
      --text-sidebar:       #8a6a50;
      --text-sidebar-hover: #4a3728;
      --text-accent:        #96334d;
      --text-accent2:       #b8536a;
      --text-mono:          #b89c80;
      --text-quote:         #7a5039;

      --nav-active-bg: #fdeef2;
      --nav-active-fg: #96334d;
      --nav-hover-bg:  #f5ede0;

      --check-shadow:      #96334d;
      --habit-shadow:      #96334d;
      --fab-border:        #96334d;
      --fab-shadow:        #96334d;
      --wday-today-shadow: #96334d;
      --pill-border:       #f5c0cc;

      --task-border:     #f0e4d0;
      --acc-note:        #fdf0df;
      --acc-note-border: #e8d4b4;
      --acc-note-shadow: #e0c9a0;
      --acc-note-text:   #7a5039;
      --toggle-track:    #e2d4c0;
      --input-border:    #e2d4c0;
      --modal-overlay:   rgba(45,31,20,0.28);
    }

    /* ── Tokens (dark) ── */
    .dark {
      --bg-page:       #18120e;
      --bg-card:       #231810;
      --bg-card-lite:  #1e1409;
      --bg-sidebar:    #1c1510;
      --bg-hover:      #2e1f13;
      --bg-accent:     #3a1520;
      --bg-topbar:     #1c1510;
      --bg-bottom-nav: #1c1510;

      --border:        #3a2a1f;
      --border-logo:   #3a2a1f;
      --shadow:        #0f0a07;
      --shadow-lite:   #100d08;
      --shadow-accent: #96334d44;

      --text-primary:       #e8d5bc;
      --text-body:          #d4be9e;
      --text-muted:         #8a6a50;
      --text-faint:         #5c4030;
      --text-sidebar:       #9a7c63;
      --text-sidebar-hover: #e8d5bc;
      --text-accent:        #e8829e;
      --text-accent2:       #f0a8bc;
      --text-mono:          #7a5c45;
      --text-quote:         #c4a882;

      --nav-active-bg: #3a1520;
      --nav-active-fg: #e8829e;
      --nav-hover-bg:  #2a1c10;

      --check-shadow:      #7a2038;
      --habit-shadow:      #7a2038;
      --fab-border:        #7a2038;
      --fab-shadow:        #7a2038;
      --wday-today-shadow: #7a2038;
      --pill-border:       #7a203855;

      --task-border:     #2e2018;
      --acc-note:        #1e160e;
      --acc-note-border: #3a2a1f;
      --acc-note-shadow: #100d08;
      --acc-note-text:   #a08060;
      --toggle-track:    #3a2a1f;
      --input-border:    #3a2a1f;
      --modal-overlay:   rgba(8,5,3,0.55);
    }

    body { background: var(--bg-page); color: var(--text-body); transition: background 0.3s, color 0.3s; }

    /* ── Shell ── */
    .app-shell { display: flex; height: 100%; overflow: hidden; background: var(--bg-page); transition: background 0.3s; }
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .content-scroll { flex: 1; overflow-y: auto; padding: 24px 32px; }
    .content-scroll::-webkit-scrollbar { width: 4px; }
    .content-scroll::-webkit-scrollbar-track { background: transparent; }
    .content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Sidebar ── */
    .sidebar { width: 220px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1.5px solid var(--border); display: flex; flex-direction: column; transition: width 0.22s ease, background 0.3s, border-color 0.3s; }
    .sidebar.collapsed { width: 56px; }
    .sidebar.collapsed .sidebar-logo-text,
    .sidebar.collapsed .sidebar-user,
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar.collapsed .sidebar-logo { padding: 18px 12px 14px; }
    .sidebar.collapsed .sidebar-logo-row { justify-content: center; }
    .sidebar.collapsed .nav-item { justify-content: center; padding: 9px; }
    .sidebar.collapsed .sidebar-bottom .nav-item { justify-content: center; padding: 9px; }

    .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1.5px solid var(--border-logo); display: flex; flex-direction: column; transition: border-color 0.3s; }
    .sidebar-logo-row { display: flex; align-items: center; gap: 8px; }
    .sidebar-logo-icon { color: #c9566e; font-size: 18px; line-height: 1; flex-shrink: 0; }
    .sidebar-logo-text { font-family: 'Lora', serif; font-weight: 600; font-size: 15px; color: var(--text-primary); white-space: nowrap; transition: color 0.3s; }
    .sidebar-user { font-size: 11px; color: var(--text-mono); margin-top: 4px; margin-left: 26px; white-space: nowrap; transition: color 0.3s; }
    .sidebar-nav { flex: 1; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
    .sidebar-bottom { padding: 8px; border-top: 1.5px solid var(--border-logo); transition: border-color 0.3s; }

    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 9px; font-size: 13px; font-weight: 500; color: var(--text-sidebar); cursor: pointer; transition: background 0.12s, color 0.12s; border: none; background: transparent; width: 100%; text-align: left; white-space: nowrap; }
    .nav-item:hover { background: var(--nav-hover-bg); color: var(--text-sidebar-hover); }
    .nav-item.active { background: var(--nav-active-bg); color: var(--nav-active-fg); font-weight: 600; }
    .nav-item svg { flex-shrink: 0; opacity: 0.75; }
    .nav-item.active svg { opacity: 1; }

    /* ── Topbar ── */
    .topbar { background: var(--bg-topbar); border-bottom: 1.5px solid var(--border); padding: 14px 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: background 0.3s, border-color 0.3s; }

    /* ── Dashboard grid ── */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 960px; }
    @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; max-width: 520px; } }

    /* ── Cards ── */
    .card { background: var(--bg-card); border-radius: 14px; border: 1.5px solid var(--border); box-shadow: 3px 4px 0px var(--shadow); padding: 20px 22px; transition: background 0.3s, border-color 0.3s, box-shadow 0.3s; }
    .card-lite { background: var(--bg-card-lite); border-radius: 10px; border: 1.5px solid var(--border); box-shadow: 2px 2.5px 0px var(--shadow-lite); padding: 12px 14px; transition: background 0.3s, border-color 0.3s; }
    .card-title { font-family: 'Lora', serif; font-weight: 600; font-size: 14px; color: var(--text-primary); display: flex; align-items: center; gap: 7px; margin-bottom: 14px; transition: color 0.3s; }
    .card-title-mono { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-mono); margin-left: auto; font-weight: 400; }

    /* ── Task rows ── */
    .task-row { display: flex; align-items: center; gap: 9px; padding: 8px 5px; cursor: pointer; border-bottom: 1px solid var(--task-border); transition: background 0.12s; border-radius: 7px; }
    .task-row:last-of-type { border-bottom: none; }
    .task-row:hover { background: var(--bg-hover); }
    .task-title { font-size: 13.5px; color: var(--text-body); flex: 1; font-weight: 500; line-height: 1.4; transition: color 0.3s; }
    .task-title.done { text-decoration: line-through; text-decoration-color: var(--text-faint); color: var(--text-muted); font-weight: 400; }

    /* ── Checkbox ── */
    .cb { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; border: 1.5px solid var(--text-faint); display: flex; align-items: center; justify-content: center; cursor: pointer; background: transparent; transition: all 0.14s; }
    .cb.done { background: #c9566e; border-color: #b0435c; box-shadow: 1px 1.5px 0px var(--check-shadow); }
    .cb:hover:not(.done) { border-color: #c9566e; }

    /* ── Habit circles ── */
    .hcircle { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--border); background: var(--bg-card); transition: all 0.18s ease; }
    .hcircle.done { background: #c9566e; border-color: #b0435c; box-shadow: 3px 3.5px 0px var(--habit-shadow); }
    .hcircle:active { transform: translate(1px, 1px); }

    /* ── Accordion ── */
    .acc-body { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.3s ease, opacity 0.25s ease; }
    .acc-body.open { max-height: 360px; opacity: 1; }

    /* ── Week strip ── */
    .wday { flex: 1; border-radius: 7px; padding: 6px 3px; display: flex; flex-direction: column; align-items: center; gap: 3px; border: 1.5px solid var(--border); background: transparent; transition: border-color 0.3s; }
    .wday.today { background: #c9566e; border-color: #b0435c; box-shadow: 2px 2.5px 0px var(--wday-today-shadow); }

    /* ── FAB ── */
    .fab { position: fixed; bottom: 24px; right: 24px; width: 50px; height: 50px; border-radius: 50%; background: #c9566e; border: 2px solid var(--fab-border); box-shadow: 3px 4px 0px var(--fab-shadow); color: white; font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; z-index: 200; }
    .fab:hover { transform: translate(-1px,-1px); box-shadow: 4px 5px 0px var(--fab-shadow); }
    .fab:active { transform: translate(2px,2px); box-shadow: 1px 1.5px 0px var(--fab-shadow); }

    /* ── Theme toggle ── */
    .theme-toggle { width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--bg-card-lite); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; flex-shrink: 0; box-shadow: 2px 2.5px 0px var(--shadow); }
    .theme-toggle:hover { border-color: #c9566e; }

    /* ── Toggle switch ── */
    .toggle-sw { width: 34px; height: 18px; border-radius: 9px; background: var(--toggle-track); border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .toggle-sw.on { background: #c9566e; }
    .toggle-sw::after { content:''; position:absolute; width:12px; height:12px; border-radius:50%; background:white; top:3px; left:3px; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .toggle-sw.on::after { transform: translateX(16px); }

    /* ── Modal ── */
    .modal-bg { position: fixed; inset: 0; background: var(--modal-overlay); display: flex; align-items: center; justify-content: center; z-index: 400; backdrop-filter: blur(3px); padding: 16px; }
    .modal { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 16px; box-shadow: 5px 6px 0px var(--shadow); padding: 24px; width: 100%; max-width: 420px; transition: background 0.3s; }
    .modal input { width: 100%; font-family: 'Geist',sans-serif; font-size: 15px; color: var(--text-primary); background: transparent; border: none; border-bottom: 1.5px solid var(--input-border); padding: 8px 0; outline: none; transition: border-color 0.2s; }
    .modal input::placeholder { color: var(--text-faint); font-style: italic; font-family: 'Lora',serif; }
    .modal input:focus { border-bottom-color: #c9566e; }

    /* ── Bottom nav ── */
    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-bottom-nav); border-top: 1.5px solid var(--border); padding: 8px 4px; z-index: 150; }
    .bottom-nav-inner { display: flex; justify-content: space-around; }
    .bottom-tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 10px; border: none; background: none; cursor: pointer; color: var(--text-mono); flex: 1; transition: color 0.15s; }
    .bottom-tab.active { color: var(--nav-active-fg); }
    .bottom-tab-label { font-size: 10px; font-weight: 500; }

    /* ── Tweaks panel ── */
    .tweaks-panel { display: none; position: fixed; bottom: 84px; right: 24px; width: 220px; background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 12px; box-shadow: 4px 5px 0 var(--shadow); padding: 16px 18px; z-index: 300; transition: background 0.3s; }
    .tweaks-panel.visible { display: block; }

    @media (max-width: 767px) {
      .topbar { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
      .content-scroll { padding: 16px 14px 90px; }
      .fab { bottom: 72px; right: 16px; width: 46px; height: 46px; font-size: 22px; }
      .hcircle { width: 46px; height: 46px; }
      .bottom-nav { display: block; }
    }
    @media (max-width: 1100px) and (min-width: 768px) { .content-scroll { padding: 20px 22px; } }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="app-components.jsx"></script>
<script type="text/babel" src="dashboard-cards.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "compactCards": false,
  "showMotivation": true,
  "serifHeaders": true,
  "sidebarCollapsed": false
}/*EDITMODE-END*/;

/* ── Quick Add Modal ── */
function QuickAddModal({ onClose }) {
  const inputRef = useRef();
  const [val, setVal] = useState('');
  const [selCat, setSelCat] = useState(null);
  const [selPrio, setSelPrio] = useState('MEDIUM');

  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 0); }, []);
  useEffect(() => {
    const fn = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [onClose]);

  const prioBtns = [{ k:'LOW', label:'Low' }, { k:'MEDIUM', label:'Med' }, { k:'HIGH', label:'High' }];

  const sectionLabel = { fontFamily:'Geist,sans-serif', fontSize:11, color:'var(--text-mono)', fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}
        style={{ animation:'modal-in 0.18s ease' }}>
        <style>{`@keyframes modal-in { from { opacity:0; transform:scale(0.96) translateY(8px); } to { opacity:1; transform:none; } }`}</style>

        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18 }}>
          <span style={{ fontFamily:'Lora,serif', fontWeight:600, fontSize:15, color:'var(--text-primary)' }}>Quick add</span>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', padding:2, lineHeight:1 }}>
            <Icons.Close />
          </button>
        </div>

        <input ref={inputRef} value={val} onChange={e => setVal(e.target.value)}
          placeholder="What's on your mind?"
          onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); if (val.trim()) onClose(); } }} />

        {/* Category picker */}
        <div style={{ marginTop:18, marginBottom:6 }}>
          <div style={sectionLabel}>Category</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {Object.entries(CAT).map(([k, c]) => (
              <button key={k} type="button" onClick={() => setSelCat(k === selCat ? null : k)}
                style={{
                  display:'flex', alignItems:'center', gap:5, padding:'4px 9px', borderRadius:7,
                  border:`1.5px solid ${k===selCat ? c.ink : c.ink+'44'}`,
                  background: k===selCat ? c.wash : 'transparent',
                  color: k===selCat ? c.ink : 'var(--text-sidebar)',
                  fontFamily:'Geist,sans-serif', fontSize:12, fontWeight: k===selCat ? 600 : 400,
                  cursor:'pointer', transition:'all 0.12s',
                }}>
                <span style={{ width:6, height:6, borderRadius:'50%', background:c.ink, display:'inline-block' }} />
                {c.name}
              </button>
            ))}
          </div>
        </div>

        {/* Priority picker */}
        <div style={{ marginTop:14 }}>
          <div style={sectionLabel}>Priority</div>
          <div style={{ display:'flex', gap:6 }}>
            {prioBtns.map(({ k, label }) => (
              <button key={k} type="button" onClick={() => setSelPrio(k)}
                style={{
                  padding:'5px 14px', borderRadius:7, fontFamily:'Geist,sans-serif', fontSize:12,
                  fontWeight: k===selPrio ? 600 : 400, cursor:'pointer',
                  border:`1.5px solid ${k===selPrio ? PRIO[k] : PRIO[k]+'44'}`,
                  background: k===selPrio ? PRIO[k]+'18' : 'transparent',
                  color: k===selPrio ? PRIO[k] : 'var(--text-sidebar)', transition:'all 0.12s',
                }}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {/* Actions */}
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:22 }}>
          <button onClick={onClose} style={{ fontFamily:'Lora,serif', fontStyle:'italic', fontSize:13, color:'var(--text-mono)', background:'none', border:'none', cursor:'pointer', padding:'6px 10px' }}>
            cancel
          </button>
          <button onClick={onClose} disabled={!val.trim()} style={{
            background: val.trim() ? '#c9566e' : 'var(--bg-card-lite)',
            border:`2px solid ${val.trim() ? '#96334d' : 'var(--border)'}`,
            borderRadius:9, boxShadow: val.trim() ? '2px 2.5px 0 #96334d' : 'none',
            color: val.trim() ? 'white' : 'var(--text-faint)',
            fontFamily:'Geist,sans-serif', fontSize:13, fontWeight:600,
            padding:'7px 18px', cursor: val.trim() ? 'pointer' : 'not-allowed', transition:'all 0.15s',
          }}>
            Add task
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Tweaks Panel ── */
function TweaksPanel({ tweaks, setTweaks, visible }) {
  const flip = key => {
    const next = { ...tweaks, [key]: !tweaks[key] };
    setTweaks(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
  };
  const rows = [
    { key:'compactCards',      label:'Compact cards'    },
    { key:'showMotivation',    label:'Daily quote'      },
    { key:'serifHeaders',      label:'Serif greeting'   },
    { key:'sidebarCollapsed',  label:'Collapse sidebar' },
  ];
  return (
    <div className={`tweaks-panel${visible ? ' visible' : ''}`}>
      <div style={{ fontFamily:'Lora,serif', fontWeight:600, fontSize:12, color:'var(--text-primary)', marginBottom:14 }}>Tweaks</div>
      {rows.map(({ key, label }) => (
        <div key={key} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12, fontFamily:'Geist,sans-serif', fontSize:13, color:'var(--text-muted)' }}>
          <span>{label}</span>
          <button className={`toggle-sw${tweaks[key] ? ' on' : ''}`} onClick={() => flip(key)} />
        </div>
      ))}
    </div>
  );
}

/* ── Root App ── */
function App() {
  const [page, setPage]           = useState('dashboard');
  const [tweaks, setTweaks]       = useState(TWEAK_DEFAULTS);
  const [tweaksOn, setTweaksOn]   = useState(false);
  const [modal, setModal]         = useState(false);
  const [dark, setDark]           = useState(() => {
    const s = localStorage.getItem('adhd-theme');
    return s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  });

  // Apply dark class
  useEffect(() => {
    const root = document.getElementById('root');
    dark ? root.classList.add('dark') : root.classList.remove('dark');
    localStorage.setItem('adhd-theme', dark ? 'dark' : 'light');
  }, [dark]);

  // Tweaks protocol
  useEffect(() => {
    const h = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  // Apply sidebar-collapse tweak
  const collapsed = tweaks.sidebarCollapsed;

  const compact = tweaks.compactCards;

  const pageProps = { dark, onToggleDark: () => setDark(d => !d) };

  return (
    <div className="app-shell">
      {/* Sidebar — hidden on mobile */}
      <div style={{ display: 'none' }} className="mobile-hide">
        <Sidebar active={page} setActive={setPage} collapsed={collapsed}
          onToggleCollapse={() => setTweaks(t => ({ ...t, sidebarCollapsed: !t.sidebarCollapsed }))} />
      </div>
      <Sidebar active={page} setActive={setPage} collapsed={collapsed}
        onToggleCollapse={() => setTweaks(t => ({ ...t, sidebarCollapsed: !t.sidebarCollapsed }))} />

      <div className="main-area">
        {page === 'dashboard' && (
          <DashboardPage
            compact={compact}
            serifHeaders={tweaks.serifHeaders}
            showMotivation={tweaks.showMotivation}
            dark={dark}
            onToggleDark={() => setDark(d => !d)}
            onOpenModal={() => setModal(true)}
          />
        )}
        {page === 'inbox'    && <InboxPage />}
        {page === 'tasks'    && <TasksPage />}
        {page === 'habits'   && <HabitsPage />}
        {page === 'reading'  && <ReadingPage />}
        {page === 'review'   && <ReviewPage />}
        {page === 'settings' && <SettingsPage {...pageProps} />}
      </div>

      {/* Mobile bottom nav */}
      <BottomNav active={page} setActive={setPage} />

      {/* FAB */}
      <button className="fab" onClick={() => setModal(true)} title="Quick add (N)" aria-label="Quick add">+</button>

      {/* Tweaks */}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksOn} />

      {/* Modal */}
      {modal && <QuickAddModal onClose={() => setModal(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
