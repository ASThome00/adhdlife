<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Geist', sans-serif; }
    #root { height: 100%; display: flex; flex-direction: column; }

    /* ── Theme tokens ── */
    :root {
      --bg-page:       #fdf6ed;
      --bg-card:       #fffef9;
      --bg-card-lite:  #faf5ea;
      --bg-sidebar:    #fffef9;
      --bg-hover:      #fdf0df;
      --bg-accent:     #fdeef2;
      --bg-topbar:     #fffef9;
      --bg-bottom-nav: #fffef9;

      --border:        #e2d4c0;
      --border-logo:   #ecdfc8;
      --shadow:        #dfd0b8;
      --shadow-lite:   #dfd0b8;
      --shadow-accent: #f5c0cc;

      --text-primary:  #2d1f14;
      --text-body:     #3d2b1a;
      --text-muted:    #a08060;
      --text-faint:    #c4a882;
      --text-sidebar:  #8a6a50;
      --text-sidebar-hover: #4a3728;
      --text-accent:   #96334d;
      --text-accent2:  #b8536a;
      --text-mono:     #b89c80;
      --text-quote:    #7a5039;

      --nav-active-bg: #fdeef2;
      --nav-active-fg: #96334d;
      --nav-hover-bg:  #f5ede0;

      --check-shadow:  #96334d;
      --habit-shadow:  #96334d;
      --fab-border:    #96334d;
      --fab-shadow:    #96334d;
      --wday-today-shadow: #96334d;
      --pill-border:   #f5c0cc;

      --dash-divider:  #f0e4d0;
      --task-border:   #f0e4d0;

      --acc-note:      #fdf0df;
      --acc-note-border: #e8d4b4;
      --acc-note-shadow: #e0c9a0;
      --acc-note-text: #7a5039;

      --toggle-track:  #e2d4c0;

      --input-border:  #e2d4c0;
      --modal-overlay: rgba(45,31,20,0.28);
    }

    .dark {
      --bg-page:       #18120e;
      --bg-card:       #231810;
      --bg-card-lite:  #1e1409;
      --bg-sidebar:    #1c1510;
      --bg-hover:      #2e1f13;
      --bg-accent:     #3a1520;
      --bg-topbar:     #1c1510;
      --bg-bottom-nav: #1c1510;

      --border:        #3a2a1f;
      --border-logo:   #3a2a1f;
      --shadow:        #0f0a07;
      --shadow-lite:   #100d08;
      --shadow-accent: #96334d44;

      --text-primary:  #e8d5bc;
      --text-body:     #d4be9e;
      --text-muted:    #8a6a50;
      --text-faint:    #5c4030;
      --text-sidebar:  #9a7c63;
      --text-sidebar-hover: #e8d5bc;
      --text-accent:   #e8829e;
      --text-accent2:  #f0a8bc;
      --text-mono:     #7a5c45;
      --text-quote:    #c4a882;

      --nav-active-bg: #3a1520;
      --nav-active-fg: #e8829e;
      --nav-hover-bg:  #2a1c10;

      --check-shadow:  #7a2038;
      --habit-shadow:  #7a2038;
      --fab-border:    #7a2038;
      --fab-shadow:    #7a2038;
      --wday-today-shadow: #7a2038;
      --pill-border:   #7a203855;

      --dash-divider:  #2e2018;
      --task-border:   #2e2018;

      --acc-note:      #1e160e;
      --acc-note-border: #3a2a1f;
      --acc-note-shadow: #100d08;
      --acc-note-text: #a08060;

      --toggle-track:  #3a2a1f;

      --input-border:  #3a2a1f;
      --modal-overlay: rgba(8,5,3,0.55);
    }

    /* ── Global ── */
    body { background: var(--bg-page); transition: background 0.3s ease; }

    /* ── App shell ── */
    .app-shell { display: flex; height: 100%; overflow: hidden; background: var(--bg-page); transition: background 0.3s; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--bg-sidebar); border-right: 1.5px solid var(--border);
      display: flex; flex-direction: column;
      box-shadow: 2px 0 0 var(--border); transition: width 0.22s ease, background 0.3s, border-color 0.3s;
    }
    .sidebar.collapsed { width: 56px; }
    .sidebar.collapsed .sidebar-logo-text,
    .sidebar.collapsed .sidebar-user,
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar.collapsed .sidebar-logo { padding: 18px 12px 14px; justify-content: center; }
    .sidebar.collapsed .sidebar-logo-row { justify-content: center; }
    .sidebar.collapsed .nav-item { justify-content: center; padding: 9px; }
    .sidebar.collapsed .sidebar-bottom .nav-item { justify-content: center; padding: 9px; }

    .sidebar-logo {
      padding: 20px 16px 16px; border-bottom: 1.5px solid var(--border-logo);
      cursor: default; display: flex; flex-direction: column; transition: border-color 0.3s;
    }
    .sidebar-logo-row { display: flex; align-items: center; gap: 8px; }
    .sidebar-logo-icon { color: #c9566e; font-size: 18px; line-height: 1; flex-shrink: 0; }
    .sidebar-logo-text { font-family: 'Lora', serif; font-weight: 600; font-size: 15px; color: var(--text-primary); white-space: nowrap; overflow: hidden; transition: color 0.3s; }
    .sidebar-user { font-family: 'Geist', sans-serif; font-size: 11px; color: var(--text-mono); margin-top: 4px; margin-left: 26px; white-space: nowrap; transition: color 0.3s; }

    .sidebar-nav { flex: 1; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 9px;
      font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--text-sidebar); cursor: pointer;
      transition: background 0.12s, color 0.12s;
      border: none; background: transparent; width: 100%; text-align: left; white-space: nowrap;
    }
    .nav-item:hover { background: var(--nav-hover-bg); color: var(--text-sidebar-hover); }
    .nav-item.active { background: var(--nav-active-bg); color: var(--nav-active-fg); font-weight: 600; }
    .nav-item svg { flex-shrink: 0; opacity: 0.75; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-bottom { padding: 8px; border-top: 1.5px solid var(--border-logo); transition: border-color 0.3s; }

    /* ── Main area ── */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Topbar ── */
    .topbar {
      background: var(--bg-topbar); border-bottom: 1.5px solid var(--border);
      padding: 14px 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 0 var(--border); gap: 12px;
      transition: background 0.3s, border-color 0.3s;
    }
    @media (max-width: 767px) {
      .topbar { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
      .topbar-progress { order: 3; }
    }

    /* ── Content scroll ── */
    .content-scroll { flex: 1; overflow-y: auto; padding: 24px 32px; }
    .content-scroll::-webkit-scrollbar { width: 4px; }
    .content-scroll::-webkit-scrollbar-track { background: transparent; }
    .content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    @media (max-width: 767px) { .content-scroll { padding: 16px 14px 90px; } }
    @media (max-width: 1100px) and (min-width: 768px) { .content-scroll { padding: 20px 22px; } }

    /* ── Grid ── */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 960px; }
    @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; max-width: 520px; } }

    /* ── Cards ── */
    .card { background: var(--bg-card); border-radius: 14px; border: 1.5px solid var(--border); box-shadow: 3px 4px 0px var(--shadow); padding: 20px 22px; transition: background 0.3s, border-color 0.3s, box-shadow 0.3s; }
    .card-lite { background: var(--bg-card-lite); border-radius: 10px; border: 1.5px solid var(--border); box-shadow: 2px 2.5px 0px var(--shadow-lite); padding: 12px 14px; transition: background 0.3s, border-color 0.3s; }
    .card-title { font-family: 'Lora', serif; font-weight: 600; font-size: 14px; color: var(--text-primary); display: flex; align-items: center; gap: 7px; margin-bottom: 14px; transition: color 0.3s; }
    .card-title-mono { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-mono); margin-left: auto; font-weight: 400; }

    /* ── Tasks ── */
    .task-row { display: flex; align-items: center; gap: 9px; padding: 8px 5px; cursor: pointer; border-bottom: 1px solid var(--task-border); transition: background 0.12s; border-radius: 7px; }
    .task-row:last-of-type { border-bottom: none; }
    .task-row:hover { background: var(--bg-hover); }
    .task-title { font-size: 13.5px; color: var(--text-body); flex: 1; font-weight: 500; line-height: 1.4; transition: color 0.3s; }
    .task-title.done { text-decoration: line-through; text-decoration-color: var(--text-faint); color: var(--text-muted); font-weight: 400; }

    /* ── Checkbox ── */
    .cb { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; border: 1.5px solid var(--text-faint); display: flex; align-items: center; justify-content: center; cursor: pointer; background: transparent; transition: all 0.14s; }
    .cb.done { background: #c9566e; border-color: #b0435c; box-shadow: 1px 1.5px 0px var(--check-shadow); }
    .cb:hover:not(.done) { border-color: #c9566e; }

    /* ── Habits ── */
    .hcircle { width: 52px; height: 52px; border-radius: 50%; font-size: 21px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--border); background: var(--bg-card); transition: all 0.18s ease; }
    .hcircle.done { background: #c9566e; border-color: #b0435c; box-shadow: 3px 3.5px 0px var(--habit-shadow); }
    .hcircle:active { transform: translate(1px,1px); }
    @media (max-width: 767px) { .hcircle { width: 46px; height: 46px; font-size: 19px; } }

    /* ── Accordion ── */
    .acc-body { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.3s ease, opacity 0.25s ease; }
    .acc-body.open { max-height: 280px; opacity: 1; }

    /* ── FAB ── */
    .fab { position: fixed; bottom: 24px; right: 24px; width: 50px; height: 50px; border-radius: 50%; background: #c9566e; border: 2px solid var(--fab-border); box-shadow: 3px 4px 0px var(--fab-shadow); color: white; font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; font-family: 'Geist', sans-serif; line-height: 1; z-index: 200; }
    .fab:hover { transform: translate(-1px,-1px); box-shadow: 4px 5px 0px var(--fab-shadow); }
    .fab:active { transform: translate(2px,2px); box-shadow: 1px 1.5px 0px var(--fab-shadow); }
    @media (max-width: 767px) { .fab { bottom: 72px; right: 16px; width: 46px; height: 46px; font-size: 24px; } }

    /* ── Week strip ── */
    .wday { flex: 1; border-radius: 7px; padding: 6px 3px; display: flex; flex-direction: column; align-items: center; gap: 3px; border: 1.5px solid var(--border); background: transparent; transition: border-color 0.3s; }
    .wday.today { background: #c9566e; border-color: #b0435c; box-shadow: 2px 2.5px 0px var(--wday-today-shadow); }

    /* ── Bottom nav (mobile) ── */
    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-bottom-nav); border-top: 1.5px solid var(--border); padding: 8px 4px env(safe-area-inset-bottom, 8px); z-index: 150; box-shadow: 0 -2px 0 var(--border); transition: background 0.3s, border-color 0.3s; }
    .bottom-nav-inner { display: flex; justify-content: space-around; }
    .bottom-tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 10px; border: none; background: none; cursor: pointer; color: var(--text-mono); flex: 1; transition: color 0.15s; }
    .bottom-tab.active { color: var(--nav-active-fg); }
    .bottom-tab-label { font-family: 'Geist', sans-serif; font-size: 10px; font-weight: 500; }
    @media (max-width: 767px) { .bottom-nav { display: block; } }

    /* ── Theme toggle button ── */
    .theme-toggle {
      width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--border);
      background: var(--bg-card-lite); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all 0.2s; flex-shrink: 0;
      box-shadow: 2px 2.5px 0px var(--shadow);
    }
    .theme-toggle:hover { border-color: #c9566e; box-shadow: 2px 2.5px 0px #c9566e55; }

    /* ── Tweaks panel ── */
    .tweaks-panel { display: none; position: fixed; bottom: 84px; right: 24px; width: 230px; background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 12px; box-shadow: 4px 5px 0px var(--shadow); padding: 18px; z-index: 300; transition: background 0.3s; }
    .tweaks-panel.visible { display: block; }
    .toggle-sw { width: 34px; height: 18px; border-radius: 9px; background: var(--toggle-track); border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .toggle-sw.on { background: #c9566e; }
    .toggle-sw::after { content:''; position:absolute; width:12px; height:12px; border-radius:50%; background:white; top:3px; left:3px; transition: transform 0.2s; }
    .toggle-sw.on::after { transform: translateX(16px); }

    /* ── Modal ── */
    .modal-bg { position: fixed; inset: 0; background: var(--modal-overlay); display: flex; align-items: center; justify-content: center; z-index: 400; backdrop-filter: blur(3px); padding: 16px; }
    .modal { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 16px; box-shadow: 5px 6px 0px var(--shadow); padding: 24px; width: 100%; max-width: 420px; transition: background 0.3s; }
    .modal input { width: 100%; font-family: 'Geist',sans-serif; font-size: 15px; color: var(--text-primary); background: transparent; border: none; border-bottom: 1.5px solid var(--input-border); padding: 8px 0; outline: none; transition: border-color 0.2s, color 0.3s; }
    .modal input::placeholder { color: var(--text-faint); font-style: italic; font-family: 'Lora',serif; }
    .modal input:focus { border-bottom-color: #c9566e; }
  </style>
</head>

// Responsive breakpoint hook
function useBreakpoint() {
  const [bp, setBp] = useState(() => {
    const w = window.innerWidth;
    return w < 768 ? 'mobile' : w < 1024 ? 'tablet' : 'desktop';
  });
  useEffect(() => {
    const fn = () => {
      const w = window.innerWidth;
      setBp(w < 768 ? 'mobile' : w < 1024 ? 'tablet' : 'desktop');
    };
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return bp;
}

/* ── Small atoms ── */
function Cb({ done, onToggle }) {
  return (
    <div className={`cb ${done?'done':''}`} onClick={e=>{e.stopPropagation();onToggle();}}>
      {done && <Icons.Check/>}
    </div>
  );
}
function PrioDot({ prio }) {
  return <span style={{width:6,height:6,borderRadius:'50%',background:PRIO[prio],display:'inline-block',flexShrink:0}}/>;
}
function CatDot({ cat, size=8 }) {
  return <span style={{width:size,height:size,borderRadius:'50%',background:CAT[cat].ink,display:'inline-block',flexShrink:0}}/>;
}
function CatPill({ cat }) {
  const c = CAT[cat];
  return <span style={{background:c.wash,color:c.ink,borderRadius:6,fontSize:11,fontWeight:500,padding:'2px 7px',border:`1px solid ${c.ink}22`}}>{c.name}</span>;

/* ── Tweaks Panel ── */
function TweaksPanel({ tweaks, setTweaks, visible }) {
  const flip = key => {
    const next = {...tweaks,[key]:!tweaks[key]};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
  };
  return (
    <div className={`tweaks-panel ${visible?'visible':''}`}>
      <div style={{fontFamily:'Lora,serif',fontWeight:600,fontSize:12,color:'var(--text-primary)',marginBottom:14,letterSpacing:'0.03em'}}>Tweaks</div>
      {[{key:'compactMode',label:'Compact layout'},{key:'showMotivation',label:'Daily quote'},{key:'serifHeaders',label:'Serif headers'}].map(({key,label})=>(
        <div key={key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11,fontFamily:'Geist,sans-serif',fontSize:13,color:'#7a5c45'}}>
          <span>{label}</span>
          <button className={`toggle-sw ${tweaks[key]?'on':''}`} onClick={()=>flip(key)}/>
        </div>
      ))}
    </div>
  );
}

/* ── ROOT APP ── */
function App() {
  const [page, setPage] = useState('dashboard');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [showModal, setShowModal] = useState(false);
  const [dark, setDark] = useState(() => {
    const saved = localStorage.getItem('adhd-theme');
    return saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  });
  const bp = useBreakpoint();

  // Apply dark class to root
  useEffect(() => {
    const root = document.getElementById('root');
    if (dark) root.classList.add('dark');
    else root.classList.remove('dark');
    localStorage.setItem('adhd-theme', dark ? 'dark' : 'light');
  }, [dark]);

  useEffect(()=>{
    const h = e => {
      if (e.data?.type==='__activate_edit_mode')   setTweaksVisible(true);
      if (e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);

  return (
    <div className="app-shell">
      <Sidebar active={page} setActive={setPage} bp={bp}/>

      <div className="main-area">
        {page==='dashboard' && <DashboardPage tweaks={tweaks} bp={bp} dark={dark} onToggleDark={()=>setDark(d=>!d)}/>}
        {page!=='dashboard' && page!=='settings' && <PlaceholderPage label={{inbox:'Inbox',tasks:'Tasks',habits:'Habits',reading:'Reading',review:'Weekly Review'}[page]||page}/>}
        {page==='settings' && <PlaceholderPage label="Settings"/>}
      </div>

      {bp === 'mobile' && <BottomNav active={page} setActive={setPage}/>}

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>

      <button className="fab" onClick={()=>setShowModal(true)} title="Quick add">+</button>

      {showModal && <QuickAddModal onClose={()=>setShowModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
